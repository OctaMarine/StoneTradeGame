<!DOCTYPE html>
<html>
<head>
    <title>Сетевой Тест</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Результат теста API:</h1>
    <p id="result" style="font-family: monospace; word-break: break-all;">Загрузка...</p>
    <script>
        const resultEl = document.getElementById('result');
        
        // Прямой вызов вашего эндпоинта
        fetch('http://192.168.0.142:5000/api/v1/users')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Сервер ответил, но со статусом ошибки: ' + response.status);
                }
                return response.json();
            })
            .then(data => {
                resultEl.textContent = 'УСПЕХ! Получен ответ от сервера. Количество юзеров: ' + (data);
                resultEl.style.color = 'green';
            })
            .catch(error => {
                // Эта ошибка покажет нам, в чем дело
                resultEl.textContent = 'ОШИБКА: ' + error.toString();
                resultEl.style.color = 'red';
            });
    </script>
</body>
</html>
